<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logg inn</title>
    <link rel="stylesheet" href="../static/login.css">

</head>
<body>

<div class="container">
    <h2>Logg inn</h2>
    <form class="signin-form" th:action="/login" method="POST" th:object="${user}">
        <div th:if="${error}">
            <p th:text="${error}"></p>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
            <div th:if="${#fields.hasErrors('email')}" class="error-text" th:errors="*{email}"></div>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
            <div th:if="${#fields.hasErrors('password')}" class="error-text" th:errors="*{password}"></div>
        </div>
        <button type="submit">Logg inn</button>
        <a href="Signup.html"><p class ="register-link">No account?</p></a>
    </form>
</div>

</body>
</html>
