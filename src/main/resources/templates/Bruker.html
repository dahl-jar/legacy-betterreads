<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,barcode_scanner,chevron_left,chevron_right,qr_code_scanner,search&display=swap">
    <link rel="stylesheet" th:href="@{/Bruker.css}">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/hovedside.css}">
    <script th:src="@{/sidebar.js}"></script>

</head>
<body>
<div id="main">
    <div th:insert="~{fragments :: header}"></div>

    <div class="container1">
        <h2>Welcome, <span th:text="${user.username}"></span>!</h2>

        <img th:src="${'/images/profile_picture.webp'}" alt="Profile Picture" class="profile-pic">
        <p><strong>Bio:</strong> <span th:text="${'No bio available'}"></span></p>
        <p><strong>Total Reviews:</strong> <span th:text="${reviewCount}"></span></p>
        <p><strong>Joined:</strong> <span th:text="${#temporals.format(user.created_at, 'dd-MM-yyyy')}"></span></p>

    </div>

    <div class="reviews-box">
        <h3>Your reviews</h3>
        <div th:if="${userReviews != null && !userReviews.isEmpty()}">
            <div class="review-content" th:each="review : ${userReviews}">
                <img th:src="${review.book.coverURL}" th:alt="${review.book.title}" class="book-image">
                <div class="review-text">
                    <div class="stars">
                        <div class="star-outer">
                            <div class="star-inner" th:style="'width:' + ${(review.rating / 5.0) * 100.0} + '%'"></div>
                        </div>
                        <span class="rating-value" th:text="${review.rating} + '/5'"></span>
                    </div>
                    <p th:text="${review.text}"></p>
                    <a th:href="@{/book(isbn=${review.book.isbn})}" class="view-book">View Book</a>
                </div>
            </div>
        </div>
        <div th:if="${userReviews == null || userReviews.isEmpty()}" class="no-reviews">
            <p>You haven't written any reviews yet.</p>
        </div>
    </div>
    <div class="container2">
        <h3>My Book Collection</h3>
        <a th:href="@{/user/booklist}" class="collection-button">View My Book Collection</a>
    </div>
</div>

<div th:insert="~{fragments :: footer}"></div>

<style>
    .collection-button {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 15px;
        background-color: #1d7484;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background-color 0.3s;
    }

    .collection-button:hover {
        background-color: #155b69;
        cursor: pointer;
    }

    .container1 {
        background-color: #f9f7f4;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 30px;
    }

    .reviews-box {
        background-color: #f9f7f4;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .container2 {
        background-color: #f9f7f4;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        padding: 20px;
        margin-top: 30px;
        text-align: center;
    }

    h2, h3 {
        color: #1d7484;
    }
</style>
</body>
</html>
