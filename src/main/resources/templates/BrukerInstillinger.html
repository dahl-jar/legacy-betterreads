<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innstillinger</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="../static/Innstillinger.css">
    <link rel="stylesheet" href="../static/footer.css">
    <script th:src="@{sidebar.js}"></script>

</head>
<body>
<div th:insert="~{fragments :: header}"></div>

<div class="settings-container">
    <h2>Innstillinger</h2>

    <div class="setting-item">
        <label for="username">Username:</label>
        <input type="text" id="username" value="Brukernavn123">
    </div>

    <div class="setting-item">
        <label for="email">Email:</label>
        <input type="email" id="email" value="bruker@example.com">
    </div>

    <div class="setting-item">
        <label for="notifications">Notifications:</label>
        <select id="notifications">
            <option value="all">All notifications</option>
            <option value="email">Only E-mail</option>
            <option value="none">No notifications</option>
        </select>
    </div>

    <div class="setting-item">
        <label for="theme">Theme:</label>
        <select id="theme">
            <option value="light">Light theme</option>
            <option value="dark">Dark theme</option>
        </select>
    </div>

    <button class="save-button">Lagre endringer</button>
</div>
</body>
</html>
