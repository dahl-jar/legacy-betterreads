<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link rel="stylesheet" href="../static/signup.css">
</head>
<body>
<div class="container">
    <h2>Sign up</h2>

    <div th:if="${error}">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/signup}" th:object="${user}" method="post">

        <div class="input-group">
            <label for="username">Username:</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Enter username..."/>
            <div th:if="${#fields.hasErrors('username')}">
                <span th:errors="*{username}"></span>
            </div>
        </div>
        <div class="input-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Enter email..."/>
            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                <span th:errors="*{email}"></span>
            </div>
        </div>
        <div class="input-group">
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Enter password..."/>

        </div>
        <div class="input-group">
            <label for="rptPassword">Repeat Password:</label>
            <input type="password" id="rptPassword" th:field="*{repeatPassword}" placeholder="Re-enter password..."/>
        </div>
        <button type="submit">Sign up</button>
        <p>By creating an account, you agree to the Goodreads Terms of Service and Privacy Policy</p>
        <p><a href="Login.html">Already have an account? Sign in</a></p>
</div>
</div>
</form>
</div>

</body>
</html>
