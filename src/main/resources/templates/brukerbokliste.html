<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Book List</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/hovedside.css}">
    <link rel="stylesheet" th:href="@{/Bruker.css}">
    <script th:src="@{/sidebar.js}"></script>
</head>
<body>
<div id="main">
    <div th:insert="~{fragments :: header}"></div>

    <h1>My Book Collection</h1>

    <div th:if="${currentlyReading != null && !currentlyReading.isEmpty()}" class="top-picks collection-section">
        <h2>Currently Reading</h2>
        <div class="scroll-container">
            <button class="scroll-btn left">
                <i class="material-symbols-outlined">chevron_left</i>
            </button>

            <div class="liste">
                <a th:each="item : ${currentlyReading}" th:href="@{/book(isbn=${item.book.isbn})}">
                    <img th:src="${item.book.coverURL}" th:alt="${item.book.title}">
                </a>
            </div>

            <button class="scroll-btn right">
                <i class="material-symbols-outlined">chevron_right</i>
            </button>
        </div>
    </div>

    <div th:if="${wantToRead != null && !wantToRead.isEmpty()}" class="top-picks collection-section">
        <h2>Want to Read</h2>
        <div class="scroll-container">
            <button class="scroll-btn left">
                <i class="material-symbols-outlined">chevron_left</i>
            </button>

            <div class="liste">
                <a th:each="item : ${wantToRead}" th:href="@{/book(isbn=${item.book.isbn})}">
                    <img th:src="${item.book.coverURL}" th:alt="${item.book.title}">
                </a>
            </div>

            <button class="scroll-btn right">
                <i class="material-symbols-outlined">chevron_right</i>
            </button>
        </div>
    </div>

    <div th:if="${haveRead != null && !haveRead.isEmpty()}" class="top-picks collection-section">
        <h2>Have Read</h2>
        <div class="scroll-container">
            <button class="scroll-btn left">
                <i class="material-symbols-outlined">chevron_left</i>
            </button>

            <div class="liste">
                <a th:each="item : ${haveRead}" th:href="@{/book(isbn=${item.book.isbn})}">
                    <img th:src="${item.book.coverURL}" th:alt="${item.book.title}">
                </a>
            </div>

            <button class="scroll-btn right">
                <i class="material-symbols-outlined">chevron_right</i>
            </button>
        </div>
    </div>

    <div th:if="${(currentlyReading == null || currentlyReading.isEmpty()) &&
              (wantToRead == null || wantToRead.isEmpty()) &&
              (haveRead == null || haveRead.isEmpty())}" class="no-books">
        <p>You haven't added any books to your collection yet.</p>
        <a th:href="@{/}" class="btn">Find books to add</a>
    </div>
</div>

<div th:insert="~{fragments :: footer}"></div>

<style>
    h1 {
        text-align: center;
    }

    .collection-section {
        margin-bottom: 30px;
    }

    .book-collection {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .book-item {
        width: 150px;
    }

    .book-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border: 1px solid #ddd;
    }

    .book-details {
        margin-top: 8px;
    }

    .book-details h3 {
        margin: 0;
        font-size: 14px;
    }

    .book-details p {
        margin: 5px 0 0;
        font-size: 12px;
        color: #666;
    }

    .no-books {
        text-align: center;
        padding: 40px;
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #1d7484;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        margin-top: 15px;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const scrollContainers = document.querySelectorAll('.scroll-container');

        scrollContainers.forEach(container => {
            const scrollList = container.querySelector('.liste');
            const leftBtn = container.querySelector('.scroll-btn.left');
            const rightBtn = container.querySelector('.scroll-btn.right');

            leftBtn.addEventListener('click', () => {
                scrollList.scrollBy({left: -300, behavior: 'smooth'});
            });

            rightBtn.addEventListener('click', () => {
                scrollList.scrollBy({left: 300, behavior: 'smooth'});
            });
        });
    });
</script>
</body>
</html>
